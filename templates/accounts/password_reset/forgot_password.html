{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - FUD-IERMS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #64748B;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            background-image: radial-gradient(#E2E8F0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #CBD5E1;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        .back-link {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <a href="{% url 'accounts:login' %}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Login
    </a>
    <div class="container w-100">
        <div class="row justify-content-center align-items-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4 py-4">
                <div class="auth-card p-3">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-key-fill fs-3"></i>
                            </div>
                            <h2 class="h3 fw-bold text-dark mb-1">Forgot Password?</h2>
                            <p class="text-secondary small">Enter your email address and we'll send you a link to reset your password.</p>
                        </div>

                        {% if form.errors %}
                            <div class="alert alert-danger shadow-sm small py-2 mb-3">
                                Please correct the errors below.
                            </div>
                        {% endif %}

                        <form method="post" novalidate>
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label for="{{ form.email.id_for_label }}" class="form-label d-flex justify-content-between">
                                    <span>Email Address</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 border-secondary">
                                        <i class="bi bi-envelope text-secondary"></i>
                                    </span>
                                    <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}" class="form-control bg-transparent border-start-0 text-dark border-secondary" placeholder="Enter your email" required autofocus>
                                </div>
                                {% for error in form.email.errors %}
                                    <div class="invalid-feedback d-block mt-1">{{ error }}</div>
                                {% endfor %}
                            </div>

                            <div class="mt-4 mb-3">
                                <button type="submit" class="btn btn-primary w-100 py-2.5 fs-6">
                                    Send Reset Link
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
