{% extends "base.html" %}

{% block title %}404 | {{ system_name }}{% endblock title %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7">
      <div class="card">
        <div class="card-header">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill text-danger"></i>
            <span>Page Not Found</span>
          </div>
        </div>
        <div class="card-body">
          <h1 class="h3 mb-2">404</h1>
          <p class="text-muted mb-4">
            The page you requested was not found.
          </p>

          {% if requested_path %}
            <div class="alert alert-secondary">
              <strong>Requested:</strong> {{ requested_path }}
            </div>
          {% endif %}

          <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" href="{% url 'home' %}">
              <i class="bi bi-house-door me-2"></i>Go to Home
            </a>
            <a class="btn btn-outline-primary" href="{% url 'equipment:list' %}">
              <i class="bi bi-laptop me-2"></i>View Equipment
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
